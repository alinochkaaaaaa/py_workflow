name: Run Tests

on:
  push:
    branches: ["**"]
  pull_request:
    branches: [main, develop]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: |
          pip install pytest pytest-cov ruff
      - name: Lint
        run: ruff check code.py test_code.py
      - name: Test
        run: pytest test_code.py -v --cov=code